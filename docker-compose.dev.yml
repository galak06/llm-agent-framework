services:
  api:
    build: .
    ports:
      - '8000:8000'
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./agents:/app/agents
    command: uv run uvicorn src.api.app:create_app --factory --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: uv run celery -A src.jobs.worker worker --loglevel=info
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./agents:/app/agents
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
