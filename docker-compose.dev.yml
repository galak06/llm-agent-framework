services:
  api:
    build: .
    ports:
      - '8000:8000'
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./agents:/app/agents
    command: uv run uvicorn src.api.app:create_app --factory --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: uv run celery -A src.jobs.worker worker --loglevel=info
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./agents:/app/agents
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_dev
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpass}
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-devpass}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
