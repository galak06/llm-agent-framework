services:
  api:
    build: .
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1.0
    ports:
      - '8000:8000'
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1.0
    command: uv run celery -A src.jobs.worker worker --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build: .
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    command: uv run celery -A src.jobs.worker flower --port=5555
    env_file: .env
    ports:
      - '5555:5555'
    depends_on:
      - worker

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
