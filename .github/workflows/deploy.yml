name: Deploy
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::confirm input must be exactly 'DEPLOY' (case-sensitive) — got '${{ inputs.confirm }}'"
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/llm-agent-framework
            git pull origin main
            docker compose build --no-cache api worker
            docker compose up -d
            docker compose exec api uv run alembic upgrade head
            docker compose exec api uv run python scripts/seed_prompts.py
            docker compose exec api uv run python scripts/healthcheck.py
            echo 'Deploy complete'
