name: Deploy
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true
        type: string

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::confirm input must be exactly 'DEPLOY' (case-sensitive) — got '${{ inputs.confirm }}'"
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          ref: main
      - id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Require green CI on the SHA we're about to deploy
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          conclusion=$(gh run list \
            --workflow=ci.yml \
            --branch=main \
            --commit="$TARGET_SHA" \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // "missing"')
          echo "CI conclusion for main@$TARGET_SHA: $conclusion"
          if [ "$conclusion" != "success" ]; then
            echo "::error::CI for main@$TARGET_SHA is '$conclusion' — must be 'success' before deploying."
            exit 1
          fi

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH (with auto-rollback)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/llm-agent-framework

            TARGET_SHA="${{ needs.preflight.outputs.sha }}"
            PREV_SHA="$(git rev-parse HEAD)"
            echo "Pre-deploy SHA: $PREV_SHA"
            echo "Target SHA:     $TARGET_SHA"

            rollback() {
              echo "::error::Deploy failed — rolling back to $PREV_SHA"
              git checkout "$PREV_SHA" || true
              docker compose build api worker || true
              docker compose up -d || true
              echo "::error::Rollback complete. Note: schema migrations are NOT reverted automatically — verify DB state manually."
              exit 1
            }
            trap rollback ERR

            git fetch origin main
            git checkout "$TARGET_SHA"

            docker compose build --no-cache api worker
            docker compose up -d
            docker compose exec -T api uv run alembic upgrade head
            docker compose exec -T api uv run python scripts/seed_prompts.py
            docker compose exec -T api uv run python scripts/healthcheck.py

            trap - ERR
            echo "Deploy complete: $TARGET_SHA"
