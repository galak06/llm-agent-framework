name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src/

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - name: Run tests with coverage
        run: |
          uv run pytest tests/unit/ tests/integration/ \
            --cov=src --cov-report=xml
        env:
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          WIDGET_API_KEY: ci-test-widget-key
          ADMIN_API_KEY: ci-test-admin-key

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen

      - name: Bandit — static security analysis
        run: uv run bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Bandit summary
        if: always()
        run: uv run bandit -r src/ -c pyproject.toml -ll

      - name: pip-audit — dependency vulnerability scan
        run: |
          uv export --no-dev --no-emit-project --format requirements-txt \
            --output-file /tmp/requirements.txt
          uv run pip-audit --requirement /tmp/requirements.txt --disable-pip

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 30
